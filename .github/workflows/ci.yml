name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...
      - run: go vet ./...

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Check all packages have test files
        run: bash scripts/pre-merge-check.sh find_untested_packages
        env:
          MERGE_CHECK: "1"
      - name: Run tests
        run: bash scripts/pre-merge-check.sh run_tests

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Check coverage thresholds
        run: bash scripts/pre-merge-check.sh check_coverage
        env:
          MERGE_CHECK: "1"

  godoc:
    name: Godoc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Check exported symbols have godoc
        run: bash scripts/pre-merge-check.sh check_godoc

  version:
    name: Version Bump
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Check version is bumped
        run: bash scripts/pre-merge-check.sh check_version_bump
        env:
          MERGE_CHECK: "1"
